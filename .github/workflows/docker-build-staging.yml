name: Build and push Docker image (staging)

on:
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            POSTGRES_PRISMA_URL=${{ secrets.POSTGRES_PRISMA_URL_STAGING }}
            RUN_PRISMA_DB_PUSH=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy (staging)
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: hcmy6w5rmilsstbpaycs868b
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_URL:-}" ] || [ -z "${COOLIFY_API_TOKEN:-}" ]; then
            echo "COOLIFY_URL nebo COOLIFY_API_TOKEN není nastavený. Deploy v Coolify přeskočen."
            exit 0
          fi
          API_URL="${COOLIFY_URL%/}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false"
          curl -fsS -X POST "$API_URL" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json"
